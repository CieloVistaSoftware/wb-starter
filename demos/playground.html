<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground — WB</title>
  <link rel="stylesheet" href="../src/styles/themes.css">
  <link rel="stylesheet" href="../src/styles/site.css">
  <style>
    body { max-width: 1200px; margin: 0 auto; padding: 1.5rem; background: var(--bg-color);
      color: var(--text-primary); line-height: 1.6; }
    h1 { margin: 0 0 0.25rem; }
    .pg-sub { color: var(--text-secondary); margin: 0 0 1.5rem; }

    /* Mobile-first: stack; two columns on wider screens. */
    .pg-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; align-items: start; }
    @media (min-width: 860px) { .pg-grid { grid-template-columns: 1fr 1fr; } }

    .pg-panel { border: 1px solid var(--border-color); border-radius: 10px; overflow: hidden;
      background: var(--bg-secondary); display: flex; flex-direction: column; }
    .pg-panel__head { display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 1rem; font-weight: 600; font-size: 0.9rem;
      border-bottom: 1px solid var(--border-color); }
    .pg-hint { color: var(--text-muted); font-size: 0.8rem; font-weight: 400; }

    /* Height is AUTOMATIC — the editor grows to fit the markup (JS sets an inline
       height from scrollHeight) up to a max, then scrolls. !important floors the
       min so WB's textarea behavior (inline min-height:3rem) can't collapse it. */
    #pg-input { width: 100%; min-height: 10rem !important; max-height: 80vh; overflow-y: auto;
      resize: vertical; border: 0; box-sizing: border-box; background: var(--bg-primary);
      color: var(--text-primary); padding: 1rem;
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
      font-size: 0.9rem; line-height: 1.6; tab-size: 2; white-space: pre; }
    #pg-input:focus { outline: none; }

    #pg-preview { padding: 1.25rem; min-height: 70vh; background: var(--bg-primary); }
    /* Space stacked top-level previewed elements (e.g. the 50 cards) so they
       don't sit flush on top of each other. */
    #pg-preview > * + * { margin-top: 1rem; }
    #pg-preview > wb-card, #pg-preview > [class*="wb-card"] { display: block; }
    /* The preview is arbitrary pasted HTML — let long content wrap, never overflow. */
    #pg-preview, #pg-preview * { max-width: 100%; overflow-wrap: anywhere; }

    .pg-btn { padding: 0.4rem 0.9rem; border-radius: 6px; border: 1px solid var(--border-color);
      background: var(--primary); color: var(--text-on-accent, #fff); cursor: pointer;
      font-size: 0.85rem; }
    .pg-btn:hover { filter: brightness(1.08); }
    .pg-error { color: var(--danger-color, #f85149); font-size: 0.85rem; padding: 0.5rem 1rem; }
  </style>
</head>
<body>
  <h1>🧪 Playground</h1>
  <p class="pg-sub">Paste any HTML on the left — see it rendered live on the right. <code>&lt;wb-*&gt;</code>
    components and <code>x-*</code> behaviors are upgraded automatically.</p>

  <div class="pg-grid">
    <div class="pg-panel">
      <div class="pg-panel__head">
        <span>HTML</span>
        <span style="display:flex; gap:0.5rem;">
          <button id="pg-clear" class="pg-btn" type="button"
            style="background:var(--bg-tertiary); color:var(--text-primary);">Clear</button>
          <button id="pg-cards" class="pg-btn" type="button"
            style="background:var(--bg-tertiary); color:var(--text-primary);"
            title="Load 50 card variations">🎴 50 Cards</button>
          <button id="pg-format" class="pg-btn" type="button"
            style="background:var(--bg-tertiary); color:var(--text-primary);"
            title="Format vertically (one attribute per line)">⭹ Format</button>
          <button id="pg-render" class="pg-btn" type="button">Render ▶</button>
          <button id="pg-copy" class="pg-btn" type="button"
            style="background:var(--bg-tertiary); color:var(--text-primary);" title="Copy the HTML">📋 Copy</button>
        </span>
      </div>
      <textarea id="pg-input" x-ignore spellcheck="false" aria-label="HTML input"></textarea>
    </div>
    <div class="pg-panel">
      <div class="pg-panel__head"><span>Preview</span><span class="pg-hint">live</span></div>
      <div id="pg-error" class="pg-error" hidden></div>
      <div id="pg-preview"></div>
    </div>
  </div>

  <!-- Appears when a previewed <form> is submitted: what an endpoint would receive. -->
  <div class="pg-panel" id="pg-endpoint" hidden style="margin-top: 1.5rem;">
    <div class="pg-panel__head">
      <span>📮 Endpoint sees</span>
      <span class="pg-hint" id="pg-endpoint-meta"></span>
    </div>
    <div id="pg-endpoint-body" style="padding: 1rem; background: var(--bg-primary);
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace; font-size: 0.85rem;
      line-height: 1.6; overflow-x: auto;"></div>
  </div>

  <script type="module">
    import WB from '../src/core/wb-lazy.js';
    import { formatHtml } from '../src/wb-viewmodels/demo.js';

    const input = document.getElementById('pg-input');
    const preview = document.getElementById('pg-preview');
    const errorBox = document.getElementById('pg-error');

    // A starter example so the page is useful immediately.
    const SAMPLE = [
      '<form>',
      '  <label>',
      '    Full Name',
      '    <input type="text" name="fullName" placeholder="John Doe" required>',
      '  </label>',
      '',
      '  <label>',
      '    Email Address',
      '    <input type="email" name="email" placeholder="john@example.com" required>',
      '  </label>',
      '',
      '  <label>',
      '    Department',
      '    <select name="department">',
      '      <option>Engineering</option>',
      '      <option>Design</option>',
      '      <option>Marketing</option>',
      '      <option>Sales</option>',
      '    </select>',
      '  </label>',
      '',
      '  <label>',
      '    Bio',
      '    <textarea name="bio" rows="3" placeholder="Tell us about yourself..."><' + '/textarea>',
      '  </label>',
      '',
      '  <label>',
      '    Experience Level',
      '    <input type="range" name="experience" min="0" max="10" value="5">',
      '  </label>',
      '',
      '  <fieldset>',
      '    <legend>Preferences</legend>',
      '    <label><input type="checkbox" name="remote" checked> Remote</label>',
      '    <label><input type="checkbox" name="relocation"> Relocation</label>',
      '  </fieldset>',
      '',
      '  <fieldset>',
      '    <legend>Contract Type</legend>',
      '    <label><input type="radio" name="contract" checked> Full-time</label>',
      '    <label><input type="radio" name="contract"> Contractor</label>',
      '  </fieldset>',
      '',
      '  <button type="submit" style="width: 100%;">Submit Application</button>',
      '</form>',
    ].join('\n');

    input.value = SAMPLE;

    // Auto-height: as tall as the markup needs, up to max-height (then scroll).
    // Inline style with 'important' so WB's textarea enhancement can't override it.
    function fitEditor() {
      input.style.setProperty('height', 'auto', 'important');
      const max = Math.round(window.innerHeight * 0.8);
      input.style.setProperty('height', Math.min(input.scrollHeight + 2, max) + 'px', 'important');
    }

    // Init WB WITHOUT global autoInject so it never enhances the playground's own
    // UI (the input textarea was being autosized/shrunk). We only ever scan the
    // preview subtree, so pasted <wb-*>/native elements still upgrade there.
    let wbReady;
    const ensureWB = () => (wbReady = wbReady || WB.init({ autoInject: false }));

    async function render() {
      errorBox.hidden = true;
      errorBox.textContent = '';
      preview.innerHTML = input.value;
      try {
        await ensureWB();
        await WB.scan(preview);
      } catch (e) {
        errorBox.hidden = false;
        errorBox.textContent = 'Render error: ' + (e && e.message ? e.message : e);
      }
    }

    // When a previewed <form> is submitted, DON'T navigate — show exactly what an
    // endpoint would receive (method, action, fields, urlencoded body, JSON).
    const endpointPanel = document.getElementById('pg-endpoint');
    const endpointBody = document.getElementById('pg-endpoint-body');
    const endpointMeta = document.getElementById('pg-endpoint-meta');
    const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    preview.addEventListener('submit', (e) => {
      const form = e.target.closest && e.target.closest('form');
      if (!form) return;
      e.preventDefault();
      const method = (form.getAttribute('method') || 'GET').toUpperCase();
      const action = form.getAttribute('action') || '(none — posts to same URL)';
      const enctype = form.getAttribute('enctype') || 'application/x-www-form-urlencoded';

      const entries = [...new FormData(form).entries()];
      const obj = {};
      for (const [k, v] of entries) obj[k] = (k in obj) ? [].concat(obj[k], v) : v;
      const body = new URLSearchParams(entries.map(([k, v]) => [k, typeof v === 'string' ? v : v.name])).toString();
      const unnamed = form.querySelectorAll(
        'input:not([name]):not([type=submit]):not([type=button]):not([type=reset]), select:not([name]), textarea:not([name])'
      ).length;

      endpointMeta.textContent = `${method} ${action}`;
      endpointBody.innerHTML =
        `<div style="color:var(--text-secondary)"># ${esc(method)} ${esc(action)} · ${esc(enctype)}</div>` +
        (entries.length
          ? `<div style="margin:0.75rem 0"><strong>Fields</strong><br>` +
              entries.map(([k, v]) => `&nbsp;&nbsp;${esc(k)} = <span style="color:var(--success-color)">${esc(typeof v === 'string' ? v : '(file) ' + v.name)}</span>`).join('<br>') +
            `</div><div style="margin:0.75rem 0"><strong>Request body</strong><br>&nbsp;&nbsp;${esc(body)}</div>` +
            `<div><strong>As JSON</strong><pre style="margin:0.25rem 0 0;white-space:pre-wrap">${esc(JSON.stringify(obj, null, 2))}</pre></div>`
          : `<div style="color:var(--warning-color)">No named fields — a browser only submits controls that have a <code>name</code> attribute.</div>`) +
        (unnamed ? `<div style="color:var(--warning-color);margin-top:0.5rem">⚠ ${unnamed} control(s) without <code>name</code> were omitted.</div>` : '');
      endpointPanel.hidden = false;
      endpointPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    // Format the buffer to our vertical rules (§5): one attribute per line for
    // multi-attribute tags, short tags on one line. Re-renders after.
    function formatInput() {
      const formatted = formatHtml(input.value);
      if (formatted) {
        input.value = formatted;
        fitEditor();
        render();
      }
    }
    document.getElementById('pg-format').addEventListener('click', formatInput);

    // Load 50 varied card types so all variants/sizes/states/shapes can be seen.
    document.getElementById('pg-cards').addEventListener('click', () => {
      const V = ['default', 'primary', 'success', 'danger', 'warning', 'info'];
      const S = ['xs', 'sm', 'md', 'lg', 'xl'];
      const LOREM = 'A short description that spans a line or two so wrapping and spacing are visible.';
      // Rotating templates give real variety: footer, subtitle+badge, elevated,
      // hoverable+tooltip, image card, pricing, profile, plain, long body.
      const T = [
        (i, v, s) => `<wb-card title="#${i} ${v} · ${s}" variant="${v}" size="${s}" footer="Footer ${i}">Body ${i}</wb-card>`,
        (i, v, s) => `<wb-card title="#${i} ${v}" variant="${v}" subtitle="With subtitle + badge" badge="New">${LOREM}</wb-card>`,
        (i, v, s) => `<wb-card title="#${i} elevated" variant="${v}" elevated footer="Elevated">Body ${i}</wb-card>`,
        (i, v, s) => `<wb-card title="#${i} hoverable" variant="${v}" hoverable tooltip="Hover text for #${i}">Hover me — ${LOREM}</wb-card>`,
        (i, v, s) => `<wb-card title="#${i} ${v}" variant="${v}">Title + body only, no footer. ${i}</wb-card>`,
        (i, v, s) => `<wb-cardimage title="#${i} image card" subtitle="cardimage" src="https://picsum.photos/seed/${i}/320/120">Image card body ${i}</wb-cardimage>`,
        (i, v, s) => `<wb-cardpricing title="Plan #${i}" price="$${i}9" variant="${v}">Feature A · Feature B · Feature C</wb-cardpricing>`,
        (i, v, s) => `<wb-cardprofile title="Person #${i}" subtitle="Role ${s}" variant="${v}">${LOREM}</wb-cardprofile>`,
      ];
      const out = [];
      for (let i = 0; i < 50; i++) {
        const v = V[i % V.length], s = S[i % S.length];
        out.push(T[i % T.length](i + 1, v, s));
      }
      input.value = out.join('\n');
      endpointPanel.hidden = true;
      fitEditor();
      render();
    });

    document.getElementById('pg-render').addEventListener('click', render);
    const copyBtn = document.getElementById('pg-copy');
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(input.value);
        const orig = copyBtn.textContent;
        copyBtn.textContent = '✓ Copied';
        setTimeout(() => { copyBtn.textContent = orig; }, 1500);
      } catch (e) { /* clipboard blocked — no-op */ }
    });
    document.getElementById('pg-clear').addEventListener('click', () => {
      endpointPanel.hidden = true;
      input.value = '';
      preview.innerHTML = '';
      errorBox.hidden = true;
      fitEditor();
      input.focus();
    });
    let debounce;
    input.addEventListener('input', () => {
      fitEditor();
      clearTimeout(debounce); debounce = setTimeout(render, 400);
    });
    window.addEventListener('resize', fitEditor);

    fitEditor();
    render();
    // WB's initial pass may re-shrink the textarea after load — re-fit once settled.
    setTimeout(fitEditor, 600);
  </script>
</body>
</html>
