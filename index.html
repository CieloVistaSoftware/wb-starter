<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Awesome Site - Built with WB</title>
  <meta name="description" content="A modern website starter kit powered by WB Behaviors">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

  <!-- Layer 1: Foundation (render-blocking, already highest priority — no preload needed) -->
  <link rel="stylesheet" href="src/styles/normalize.css?v=37e2088">
  <link rel="stylesheet" href="src/styles/themes.css?v=37e2088">
  <link rel="stylesheet" href="src/styles/site.css?v=37e2088">
  <link rel="stylesheet" href="src/styles/safari-fixes.css?v=37e2088">
  <link rel="modulepreload" href="src/core/wb.js?v=37e2088">
  <link rel="modulepreload" href="src/core/site-engine.js?v=37e2088">

  <!-- Page Transitions CSS -->
  <link rel="stylesheet" href="src/styles/transitions.css?v=37e2088">
  <!-- Navbar CSS already loads via site.css's own @import — no separate link needed. -->

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- PWA Support -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
</head>
<body>
  <!-- 
    ARCHITECTURAL NOTE:
    You won't see the standard HTML structure here. This project uses a 
    "Schema-First" architecture where the UI is generated dynamically.
    
    - src/core/site-engine.js: Builds the shell (Header, Nav, Footer)
    - config/site.json: Defines the structure and content
    - pages/*.html: Contains the actual page content loaded via fetch()
    
    This separation allows for deterministic AI generation and self-healing capabilities.

    HOW TO EDIT THE UI:
    1. To change the Layout (Header, Sidebar, Footer):
       - Edit `src/core/site-engine.js` (The render methods generate the HTML strings)
       - Edit `src/styles/site.css` (The styles for the shell)

    2. To change the Content (Pages):
       - Look in `pages/` folder. Each file corresponds to a route (e.g., ?page=home -> pages/home.html)

    3. To change the Configuration (Menu items, Site Name, Theme):
       - Edit `config/site.json`
  -->
  <!-- Site container - built dynamically from config -->
  <div id="app" class="site">
    <div class="site__loading">
      <wb-spinner color="primary"></wb-spinner>
      <p>Loading...</p>
    </div>
  </div>

  <!-- Fallback UI for config load failure -->
  <template id="error-template">
    <div class="site__error">
      <div class="error__icon">⚠️</div>
      <h1>Unable to Load Site</h1>
      <p>Could not load configuration. Please check your connection and try again.</p>
      <button onclick="location.reload()" class="error__retry" x-ripple>
        Retry
      </button>
    </div>
  </template>

  <!-- Premium Navbar Scroll Effect -->
  <script src="src/lib/premium-navbar.js?v=37e2088"></script>

  <!-- Main Application Bootstrap -->
  <script type="module" src="./src/main.js?v=37e2088"></script>
</body>
</html>
